{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container page-content text-center mt-5">

    <h4 id="title">Complete Your UPI Payment</h4>

    <button id="rzp-button" class="btn btn-success mt-4 px-4 py-2">
        Pay ₹ {{ display_amount }}
    </button>

    <div id="loader" style="display:none; margin-top:25px;">
        <div class="spinner-border text-success"></div>
        <p class="mt-3">Opening secure payment...</p>
    </div>

    <!-- Cancel / Back Buttons -->
    <div id="cancelBox" style="display:none; margin-top:25px;">

        <button id="backBtn" class="btn btn-primary w-100 mb-2">
            Back
        </button>

    </div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const btn = document.getElementById("rzp-button");
    const loader = document.getElementById("loader");
    const title = document.getElementById("title");
    const cancelBox = document.getElementById("cancelBox");
    const backBtn = document.getElementById("backBtn");

    if (!btn) return;

    const params = new URLSearchParams(window.location.search);
    const startPayment = params.get("start_payment");

    // -----------------------------------------
    // BACK BUTTON LOGIC
    // -----------------------------------------
    if (backBtn) {

        backBtn.onclick = function () {

            // Chrome payment mode (came from app)
            if (startPayment) {
                window.location.href =
                    "https://www.loka-store.online/payment-failed/";
            }

            // Normal website mode
            else {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.location.href =
                        "https://www.loka-store.online/";
                }
            }
        };
    }

    // -----------------------------------------
    // STEP 1 : APP WEBVIEW MODE
    // -----------------------------------------
    if (!startPayment) {

        // Reset UI every page load
        btn.disabled = false;
        btn.style.display = "inline-block";
        btn.innerText = "Pay ₹ {{ display_amount }}";
        loader.style.display = "none";
        cancelBox.style.display = "none";
        title.innerText = "Complete Your UPI Payment";

        btn.onclick = function (e) {
            e.preventDefault();

            btn.disabled = true;
            btn.innerText = "Redirecting...";

            let nextUrl = window.location.href;

            if (nextUrl.includes("?")) {
                nextUrl += "&start_payment=true";
            } else {
                nextUrl += "?start_payment=true";
            }

            const isAndroidApp = /wv|Android/i.test(navigator.userAgent);

            if (isAndroidApp) {
                window.open(nextUrl, "_blank");
            } else {
                window.location.replace(nextUrl);
            }

            // Auto reset if user returns
            setTimeout(function () {
                btn.disabled = false;
                btn.innerText = "Pay ₹ {{ display_amount }}";
            }, 4000);
        };

        return;
    }

    // -----------------------------------------
    // STEP 2 : CHROME PAYMENT MODE
    // -----------------------------------------
    btn.style.display = "none";
    loader.style.display = "block";
    title.innerText = "Secure Browser Payment";

    setTimeout(function () {

        if (typeof Razorpay === "undefined") {
            loader.style.display = "none";
            title.innerText = "Payment system unavailable";
            cancelBox.style.display = "block";
            return;
        }

        const options = {
            key: "{{ razorpay_key }}",
            amount: Number("{{ amount }}"),
            currency: "INR",
            name: "Kagal Marketplace",
            description: "Order Payment",
            order_id: "{{ razorpay_order_id }}",

            prefill: {
                name: "{{ customer_name }}",
                contact: "{{ phone }}"
            },

            theme: {
                color: "#198754"
            },

            handler: function (response) {

                window.location.href =
                    "https://www.loka-store.online/payment-success/?razorpay_payment_id="
                    + response.razorpay_payment_id
                    + "&razorpay_order_id=" + response.razorpay_order_id
                    + "&razorpay_signature=" + response.razorpay_signature
                    + "&pending_id={{ pending_id }}";
            },

            modal: {
                ondismiss: function () {
                    loader.style.display = "none";
                    title.innerText = "Payment Cancelled";
                    cancelBox.style.display = "block";
                }
            }
        };

        const rzp = new Razorpay(options);

        rzp.on("payment.failed", function () {
            loader.style.display = "none";
            title.innerText = "Payment Failed";
            cancelBox.style.display = "block";
        });

        rzp.open();

    }, 1200);

});
</script>

{% endblock %}
