{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container page-content text-center mt-5">
    <h4>{% trans "Complete Your UPI Payment" %}</h4>

    <button id="rzp-button" class="btn btn-success mt-4 px-4 py-2">
        Pay ₹ {{ display_amount }}
    </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const btn = document.getElementById("rzp-button");

    if (!btn) return;

    // 🔥 If user clicks PAY inside app
    btn.onclick = function(e){
        e.preventDefault();

        btn.disabled = true;
        btn.innerText = "Opening payment...";

        let currentUrl = window.location.href;

        // add flag only once
        if (!currentUrl.includes("start_payment=true")) {

            if (currentUrl.includes("?")) {
                window.location.href = currentUrl + "&start_payment=true";
            } else {
                window.location.href = currentUrl + "?start_payment=true";
            }
        }
    };

    // 🔥 If Chrome page loaded after redirect
    const params = new URLSearchParams(window.location.search);
    const startPayment = params.get("start_payment");

    if (startPayment === "true") {

        var options = {
            key: "{{ razorpay_key }}",
            amount: Number("{{ amount }}"),
            currency: "INR",
            name: "Kagal Marketplace",
            description: "Order Payment",
            order_id: "{{ razorpay_order_id }}",

            handler: function (response){

                window.location.href =
                    "https://www.loka-store.online/payment-success/?razorpay_payment_id="
                    + response.razorpay_payment_id
                    + "&razorpay_order_id=" + response.razorpay_order_id
                    + "&razorpay_signature=" + response.razorpay_signature
                    + "&pending_id={{ request.session.pending_id }}";
            },

            prefill: {
                name: "{{ customer_name }}",
                contact: "{{ phone }}"
            },

            theme: {
                color: "#198754"
            }
        };

        var rzp = new Razorpay(options);

        setTimeout(function(){
            rzp.open();
        }, 400);
    }

});
</script>

{% endblock %}
