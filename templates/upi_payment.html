<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    key: "{{ razorpay_key }}",
    amount: Number("{{ amount }}"),
    currency: "INR",
    name: "Kagal Marketplace",
    description: "Order Payment",
    order_id: "{{ razorpay_order_id }}",

    handler: function (response){

        console.log("✅ PAYMENT SUCCESS RESPONSE:", response);

        window.location.href = "/payment-success/?razorpay_payment_id="
            + response.razorpay_payment_id
            + "&razorpay_order_id=" + response.razorpay_order_id
            + "&razorpay_signature=" + response.razorpay_signature
            + "&pending_id={{ request.session.pending_id }}";
    },

    prefill: {
        name: "{{ customer_name }}",
        contact: "{{ phone }}"
    },

    theme: {
        color: "#198754"
    }
};

document.getElementById('rzp-button').onclick = function(e){

    e.preventDefault();

    console.log("🚀 BUTTON CLICKED");

    // ✅ SAFETY CHECK
    if (typeof Razorpay === "undefined") {
        alert("Payment system not loaded. Please refresh.");
        return;
    }

    this.disabled = true;
    this.innerText = "Processing...";

    // ✅ CREATE INSTANCE HERE (IMPORTANT)
    var rzp = new Razorpay(options);

    // ✅ FAILURE DEBUG
    rzp.on('payment.failed', function (response){

        console.log("❌ PAYMENT FAILED FULL OBJECT:", response);

        alert(
            "Payment Failed\n\n" +
            "Code: " + response.error.code + "\n" +
            "Reason: " + response.error.reason + "\n" +
            "Step: " + response.error.step + "\n" +
            "Description: " + response.error.description
        );

        document.getElementById('rzp-button').disabled = false;
        document.getElementById('rzp-button').innerText = "Pay Now";
    });

    rzp.open();
};
</script>
