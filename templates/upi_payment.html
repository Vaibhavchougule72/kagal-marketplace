{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container page-content">
    <h4>{% trans "Complete Your UPI Payment" %}</h4>

    <button id="rzp-button" class="btn btn-success mt-4 px-4 py-2">
        Pay ₹ {{ display_amount }}
    </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    var btn = document.getElementById('rzp-button');

    if (!btn) {
        console.log("⚠️ Not payment page");
        return;
    }

    var options = {
        key: "{{ razorpay_key }}",
        amount: Number("{{ amount }}"),
        currency: "INR",
        name: "Kagal Marketplace",
        description: "Order Payment",
        order_id: "{{ razorpay_order_id }}",

        modal: {
            ondismiss: function(){
                console.log("❌ User closed payment popup");
            }
        },

        handler: function (response){

            console.log("✅ PAYMENT SUCCESS:", response);

            window.location.href = "/payment-success/?razorpay_payment_id="
                + response.razorpay_payment_id
                + "&razorpay_order_id=" + response.razorpay_order_id
                + "&razorpay_signature=" + response.razorpay_signature
                + "&pending_id={{ request.session.pending_id }}";
        },

        prefill: {
            name: "{{ customer_name }}",
            contact: "{{ phone }}"
        },

        theme: {
            color: "#198754"
        }
    };

    btn.onclick = function(e){

        e.preventDefault();

        console.log("🚀 PAY BUTTON CLICKED");

        if (typeof Razorpay === "undefined") {
            alert("❌ Razorpay not loaded. Refresh page.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";

        var rzp = new Razorpay(options);

        // 🔥 VERY IMPORTANT (THIS SHOWS REAL ERROR)
        rzp.on('payment.failed', function (response){

            console.log("❌ FULL FAILURE:", response);

            alert(
                "❌ PAYMENT FAILED\n\n" +
                "Code: " + response.error.code + "\n" +
                "Reason: " + response.error.reason + "\n" +
                "Step: " + response.error.step + "\n" +
                "Description: " + response.error.description + "\n" +
                "Source: " + response.error.source
            );

            btn.disabled = false;
            btn.innerText = "Pay ₹ {{ display_amount }}";
        });

        rzp.open();
    };

});
</script>
{% endblock %}
