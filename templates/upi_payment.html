{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container page-content text-center mt-5">
    <h4>{% trans "Complete Your UPI Payment" %}</h4>

    <button id="rzp-button" class="btn btn-success mt-4 px-4 py-2">
        Pay ₹ {{ display_amount }}
    </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const btn = document.getElementById("rzp-button");
    if (!btn) return;

    const params = new URLSearchParams(window.location.search);
    const startPayment = params.get("start_payment");

    // ----------------------------------------------------
    // STEP 1: Inside App WebView
    // First click opens Chrome
    // ----------------------------------------------------
    if (!startPayment) {

        btn.onclick = function (e) {
            e.preventDefault();

            btn.disabled = true;
            btn.innerText = "Opening payment...";

            let nextUrl = window.location.href;

            if (nextUrl.includes("?")) {
                nextUrl += "&start_payment=true";
            } else {
                nextUrl += "?start_payment=true";
            }

            window.location.href = nextUrl;
        };

        return;
    }

    // ----------------------------------------------------
    // STEP 2: In Chrome Browser
    // Second click opens Razorpay
    // ----------------------------------------------------

    btn.disabled = false;
    btn.innerText = "Continue to Pay ₹ {{ display_amount }}";

    btn.onclick = function (e) {
        e.preventDefault();

        if (typeof Razorpay === "undefined") {
            alert("Payment system failed to load. Please refresh page.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Opening Razorpay...";

        var options = {
            key: "{{ razorpay_key }}",
            amount: Number("{{ amount }}"),
            currency: "INR",
            name: "Kagal Marketplace",
            description: "Order Payment",
            order_id: "{{ razorpay_order_id }}",

            modal: {
                ondismiss: function () {
                    btn.disabled = false;
                    btn.innerText = "Continue to Pay ₹ {{ display_amount }}";
                }
            },

            handler: function (response) {

                window.location.href =
                    "https://www.loka-store.online/payment-success/?razorpay_payment_id="
                    + response.razorpay_payment_id
                    + "&razorpay_order_id=" + response.razorpay_order_id
                    + "&razorpay_signature=" + response.razorpay_signature
                    + "&pending_id={{ request.session.pending_id }}";
            },

            prefill: {
                name: "{{ customer_name }}",
                contact: "{{ phone }}"
            },

            theme: {
                color: "#198754"
            }
        };

        var rzp = new Razorpay(options);

        rzp.on('payment.failed', function () {
            btn.disabled = false;
            btn.innerText = "Continue to Pay ₹ {{ display_amount }}";
        });

        rzp.open();
    };

});
</script>

{% endblock %}
