{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container page-content text-center mt-5">

    <h4 id="title">Complete Your UPI Payment</h4>

    <button id="rzp-button" class="btn btn-success mt-4 px-4 py-2">
        Pay ₹ {{ display_amount }}
    </button>

    <div id="loader" style="display:none; margin-top:25px;">
        <div class="spinner-border text-success"></div>
        <p class="mt-3">Opening secure payment...</p>
    </div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const btn = document.getElementById("rzp-button");
    const loader = document.getElementById("loader");
    const title = document.getElementById("title");

    const params = new URLSearchParams(window.location.search);
    const startPayment = params.get("start_payment");

    // -----------------------------
    // APP WEBVIEW
    // -----------------------------
    if(!startPayment){

        btn.onclick = function(e){
            e.preventDefault();

            btn.disabled = true;
            btn.innerText = "Redirecting...";

            let nextUrl = window.location.href;

            if(nextUrl.includes("?")){
                nextUrl += "&start_payment=true";
            }else{
                nextUrl += "?start_payment=true";
            }

            window.location.href = nextUrl;
        };

        return;
    }

    // -----------------------------
    // CHROME PAYMENT MODE
    // -----------------------------
    btn.style.display = "none";
    loader.style.display = "block";
    title.innerText = "Secure Browser Payment";

    setTimeout(function(){

        var options = {
            key: "{{ razorpay_key }}",
            amount: Number("{{ amount }}"),
            currency: "INR",
            name: "Kagal Marketplace",
            description: "Order Payment",
            order_id: "{{ razorpay_order_id }}",

            prefill: {
                name: "{{ customer_name }}",
                contact: "{{ phone }}"
            },

            theme: {
                color: "#198754"
            },

            handler: function(response){

                window.location.href =
                    "https://www.loka-store.online/payment-success/?razorpay_payment_id="
                    + response.razorpay_payment_id
                    + "&razorpay_order_id=" + response.razorpay_order_id
                    + "&razorpay_signature=" + response.razorpay_signature
                    + "&pending_id={{ request.session.pending_id }}";
            },

            modal: {
                ondismiss: function(){
                    loader.style.display = "none";
                    btn.style.display = "inline-block";
                    btn.disabled = false;
                    btn.innerText = "Retry Payment";
                    title.innerText = "Payment Cancelled";
                }
            }
        };

        var rzp = new Razorpay(options);
        rzp.open();

    }, 1200);

});
</script>

{% endblock %}
