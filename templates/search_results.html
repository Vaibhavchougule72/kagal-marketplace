{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container page-content">

    <h4 class="mb-3">Search Results for "{{ query }}"</h4>

    <!-- 🔽 Filters Section -->
    <form method="GET" class="row g-3 mb-4">

        <input type="hidden" name="q" value="{{ query }}">

        <!-- Store Filter -->
        <div class="col-md-4">
            <select name="store" class="form-select">
                <option value="">{% trans "All Stores" %}</option>
                {% for store in stores %}
                <option value="{{ store.id }}"
                    {% if selected_store == store.id|stringformat:"s" %}selected{% endif %}>
                    {{ store.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label>{% trans "Price Range" %}</label>
            <div class="d-flex">
                <input type="number"
                    name="min_price"
                    class="form-control me-2"
                    placeholder="Min"
                    value="{{ min_price|default:'' }}">

                <input type="number"
                    name="max_price"
                    class="form-control"
                    placeholder="Max"
                    value="{{ max_price|default:'' }}">
            </div>
        </div>

        <!-- Sort Dropdown -->
        <div class="col-md-4">
            <select name="sort" class="form-select">
                <option value="">{% trans "Sort By" %}</option>
                <option value="price_low"
                    {% if selected_sort == "price_low" %}selected{% endif %}>
                    {% trans "Price: Low to High" %}
                </option>
                <option value="price_high"
                    {% if selected_sort == "price_high" %}selected{% endif %}>
                    {% trans "Price: High to Low" %}
                </option>
                <option value="newest"
                    {% if selected_sort == "newest" %}selected{% endif %}>
                    {% trans "Newest First" %}
                </option>
            </select>
        </div>

        <div class="col-md-4">
            <button class="btn btn-success w-100">
                {% trans "Apply Filters" %}
            </button>
        </div>

    </form>

    <hr>

    {% if products %}
        <div class="row g-4">
            {% for product in products %}
            
            <div class="col-6 col-md-4 col-lg-3">
                <div class="loka-product-card product-card"
                    data-id="{{ product.id }}"
                    data-name="{{ product.name }}"
                    data-price="{{ product.price }}"
                    data-desc="{{ product.description }}"
                    data-image="{{ product.image.url }}">

                    <div class="loka-product-image">
                        <img src="{{ product.image.url|cut:'upload/'|add:'upload/w_300,q_60,f_auto/' }}"
                            class="img-fluid product-img"
                            alt="{{ product.name }}"
                            loading="lazy">
                    </div>

                    <div class="loka-product-body">
                        <h6 class="loka-product-name">
                            {{ product.name }}
                        </h6>

                        <p class="loka-product-desc">
                            {{ product.store.name }}
                        </p>

                        <div class="loka-product-bottom">
                            <span class="loka-price">
                                ₹{{ product.price }}
                            </span>

                            <button class="loka-add-btn add-to-cart-btn"
                                    data-id="{{ product.id }}">
                                Add
                            </button>
                        </div>

                    </div>

                </div>
            </div>

            {% endfor %}
        </div>
    {% else %}
        <p>No products found.</p>
    {% endif %}

</div>

{% endblock %}
