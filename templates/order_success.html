{% extends 'base.html' %}
{% block content %}

<div class="container py-5 text-center">

<h2 class="text-success">✅ ऑर्डर यशस्वी</h2>

<p class="mt-3">
तुमची ऑर्डर यशस्वीरित्या नोंद झाली आहे.
</p>

<p class="text-muted" id="openingText">
अॅप उघडत आहे...
</p>

<a href="{% url 'order_tracking' order.id %}"
class="btn btn-primary w-100 mt-3">
ऑर्डर ट्रॅक करा
</a>

<div id="returnBox"
style="visibility:hidden;">

<p class="mt-4 text-muted">
अॅप उघडले नाही?
</p>

<button id="openAppBtn"
class="btn btn-success w-100">
अॅपमध्ये परत जा
</button>

</div>

<a href="/"
class="btn btn-outline-dark w-100 mt-3">
मुख्यपृष्ठ
</a>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const orderId = "{{ order.id }}";

    // ✅ TRACK PURCHASE (FIRST THING)
    if(!sessionStorage.getItem("purchase_tracked_" + orderId)){
        
        if(typeof gtag === "function"){
            gtag('event', 'purchase', {
                transaction_id: orderId,
                value: parseFloat("{{ order.total }}"),
                currency: 'INR'
            });

            console.log("Purchase tracked:", orderId);

            sessionStorage.setItem("purchase_tracked_" + orderId, "1");
        } else {
            console.log("gtag not loaded");
        }
    }

    // 🔽 YOUR EXISTING CODE (UNCHANGED)
    const appUrl = "lokamarketplace://order-success/" + orderId;

    function openApp(){
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = appUrl;
        document.body.appendChild(iframe);

        setTimeout(function(){
            iframe.remove();
        },1200);
    }

    const key = "opened_app_" + orderId;

    if(!sessionStorage.getItem(key)){
        sessionStorage.setItem(key,"1");

        setTimeout(function(){
            openApp();
        },700);
    }

    setTimeout(function(){
        document.getElementById("openingText").innerText =
        "अॅप उघडले नाही? खालील बटण वापरा.";

        document.getElementById("returnBox").style.visibility = "visible";
    },2200);

    document.getElementById("openAppBtn").onclick = function(){
        openApp();
    };

});
</script>

{% endblock %}
